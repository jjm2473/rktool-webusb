<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rkdeveloptool WebUSB 示例</title>
</head>
<body>
  <h1>rkdeveloptool WebUSB 示例</h1>

  <div>
    <label for="pick-loader">选择loader文件</label>
    <input id="pick-loader" type="file" accept=".bin" />
  </div>
  <div>
    <label for="pick-file">选择固件文件</label>
    <input id="pick-file" type="file" accept=".bin,.img" />
  </div>

  <div>
    <button id="pick-device">选择 Rockchip 设备</button>
  </div>

  <div>
    <button id="dl-loader" disabled>下载Loader</button>
    <button id="dl-file" disabled>下载固件</button>
    <select id="power">
      <option value="">电源</option>
      <option value="reboot">重启</option>
      <option value="reboot-maskrom">重启到MASKROM</option>
      <option value="power-off">关机</option>
    </select>
    <select id="change-storage">
      <option value="">切换存储</option>
      <option value="emmc">eMMC</option>
      <option value="sd">SD</option>
      <option value="spirom">SPIROM</option>
    </select>
  </div>
  <div>
    <input id="command" type="text" value="ld" style="width: 360px;" />
    <button id="run">执行命令</button>
  </div>

  <pre id="output" style="background:#111;color:#0f0;padding:12px;min-height:220px;max-height:400px;overflow:auto;"></pre>

  <script type="module">
    import { createRKToolWorker } from './src/worker-proxy.js';

    const output = document.getElementById('output');
    const pickLoaderInput = document.getElementById('pick-loader');
    const dlLoaderBtn = document.getElementById('dl-loader');
    const pickFileInput = document.getElementById('pick-file');
    const dlFileBtn = document.getElementById('dl-file');  
    const pickDeviceBtn = document.getElementById('pick-device');
    const powerSelect = document.getElementById('power');
    const changeStorageSelect = document.getElementById('change-storage');
    const runBtn = document.getElementById('run');
    const commandInput = document.getElementById('command');

    let selectedLoader = null;
    let selectedFile = null;
    let usbConnected = false;

    function appendLine(text) {
      output.textContent += `${text}\n`;
      output.scrollTop = output.scrollHeight;
    }

    appendLine('初始化中...');
    navigator.usb.addEventListener("connect", (event) => {
      appendLine(`设备已连接: ${event.device.productName} (${event.device.productId.toString(16)})`);
      window.rkdev = event.device;
      usbConnected = true;
    });
    navigator.usb.addEventListener("disconnect", (event) => {
      appendLine(`设备已断开: ${event.device.productName} (${event.device.productId.toString(16)})`);
      usbConnected = false;
    });
    const appendStdio = (function(){
      let last = '';
      return function(text) {
        if (last == text) {
          return;
        }
        last = text;
        appendLine(text);
      };
    })();

    const wrapper = await createRKToolWorker({
      runtime: 'browser',
      onStdout: appendStdio,
      onStderr: appendStdio,
      onLogWrite: (text) => appendLine(`[log] ${text}`),
    });
    appendLine('初始化完成（运行在 Worker 中）');

    pickLoaderInput.addEventListener('change', async () => {
      try {
        const loader = pickLoaderInput.files?.[0] || null;
        if (!loader) {
          selectedLoader = null;
          dlLoaderBtn.disabled = true;
          return;
        }
        selectedLoader = await wrapper.mountFile('MiniLoaderAll.bin', loader);
        dlLoaderBtn.disabled = false;
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });
    dlLoaderBtn.addEventListener('click', async () => {
      try {
        await wrapper.runCommand(['db', selectedLoader], {requestDevice: !usbConnected});
        appendLine('loader 下载完成，可能要点击“选择 Rockchip 设备”按钮重新连接');
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    pickFileInput.addEventListener('change', async () => {
      try {
        selectedFile = pickFileInput.files?.[0] || null;
        if (!selectedFile) {
          dlFileBtn.disabled = true;
          return;
        }
        dlFileBtn.disabled = false;
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    dlFileBtn.addEventListener('click', async () => {
      let result;
      try {
        if (!usbConnected) {
          window.rkdev = await wrapper.requestDevice([{ vendorId: 0x2207 }]);
          appendLine(`设备已授权: ${window.rkdev.productName} (${window.rkdev.productId.toString(16)})`);
          usbConnected = true;
        }

        if (!window.rkdev.serialNumber) {
          if (selectedLoader == null) {
            appendLine('MASKROM 模式需要选择 Loader 文件！');
            return;
          }
          appendLine('下载 Loader 中...');
          result = await wrapper.runCommand(['db', selectedLoader]);
          if (result.exitCode === 0) {
            appendLine('Loader 下载完成');
          } else {
            appendLine('Loader 下载失败');
            return;
          }
          // Loader 下载完成后设备会重新连接，等1秒再继续操作
          await new Promise((resolve)=>{setTimeout(resolve, 1000)})
        }
        
        appendLine('下载固件中...');
        result = await wrapper.runCommand(['wl', '0', '$FILE'], {
          requestDevice: !usbConnected,
          fileSource: selectedFile,
          fileName: selectedFile.name,
          replaceToken: '$FILE',
        });
        if (result.exitCode === 0) {
          appendLine('固件下载成功');
        } else {
          appendLine('固件下载失败');
          return;
        }
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    pickDeviceBtn.addEventListener('click', async () => {
      let device;
      try {
        window.rkdev = device = await wrapper.requestDevice([{ vendorId: 0x2207 }]);
        appendLine(`设备已授权: ${device.productName} (${device.productId.toString(16)})`);
        usbConnected = true;
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    powerSelect.addEventListener('change', async () => {
      const action = powerSelect.value;
      powerSelect.value = "";
      const options = {
        requestDevice: !usbConnected,
      };
      if (action === '')
        return;
      try {
        let cmdArgs = null;
        if (action === 'reboot') {
          cmdArgs = ['rd'];
        } else if (action === 'reboot-maskrom') {
          cmdArgs = ['rd', '3'];
        } else if (action === 'power-off') {
          cmdArgs = ['rd', '2'];
        } else {
          return;
        }
        let result = await wrapper.runCommand(cmdArgs, options);
        appendLine(`已执行: 电源 ${action} 结果 ${result.exitCode==0 ? '成功' : '失败'}`);
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    changeStorageSelect.addEventListener('change', async () => {
      const action = changeStorageSelect.value;
      changeStorageSelect.value = "";
      const options = {
        requestDevice: !usbConnected,
      };
      if (action === '')
        return;
      try {
        let cmdArgs = null;
        if (action === 'emmc') {
          cmdArgs = ['cs', '1'];
        } else if (action === 'sd') {
          cmdArgs = ['cs', '2'];
        } else if (action === 'spirom') {
          cmdArgs = ['cs', '9'];
        } else {
          return;
        }
        let result = await wrapper.runCommand(cmdArgs, options);
        appendLine(`已执行: 切换存储到 ${action} 结果 ${result.exitCode==0 ? '成功' : '失败'}`);
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    runBtn.addEventListener('click', async () => {
      const raw = commandInput.value.trim();
      if (!raw) {
        appendLine('请输入命令');
        return;
      }

      const args = raw.split(/\s+/);
      const options = {
        requestDevice: !usbConnected,
      };

      if (selectedFile) {
        options.fileSource = selectedFile;
        options.fileName = selectedFile.name;
        options.replaceToken = '$FILE';
      }

      appendLine(`> ${args.join(' ')}`);
      const result = await wrapper.runCommand(args, options);
      appendLine(`exit=${result.exitCode}`);
    });
  </script>
</body>
</html>
